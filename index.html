<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIM Bright Ideas LLC | Master Suite</title>
    <style>
        :root { --primary: #2F6B64; --accent: #22c55e; --bg: #f1f5f9; --text: #1e293b; --danger: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .logo { font-weight: 900; color: var(--primary); font-size: 18px; text-transform: uppercase; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-item { flex: 0 0 auto; padding: 15px 15px; font-size: 10px; font-weight: bold; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 12px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        label { display: block; font-size: 9px; font-weight: 800; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .search-box { background: #fff; border: 2px solid var(--primary); margin-bottom: 15px; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-qty { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-danger { color: var(--danger); background: none; border: none; cursor: pointer; font-weight: bold; padding: 5px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .material-row { display: grid; grid-template-columns: 1.2fr 0.8fr auto; gap: 5px; align-items: end; margin-bottom: 10px; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; border-radius: 15px 15px 0 0; z-index: 1000; text-align: center; font-weight: bold; }
        .action-btns { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div class="header"><div class="logo">DIM Bright Ideas LLC</div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('orders', this)">Orders</div>
        <div class="nav-item" onclick="showPage('pricing', this)">Pricing</div>
        <div class="nav-item" onclick="showPage('materials', this)">Materials</div>
        <div class="nav-item" onclick="showPage('inventory', this)">Inventory</div>
        <div class="nav-item" onclick="showPage('costs', this)">Costs</div>
    </div>

    <div class="container">
        <input type="text" id="globalSearch" class="search-box" placeholder="Search this tab..." oninput="filterLists()">

        <div id="orders" class="page active">
            <div class="card">
                <h3 id="orderHeader">New Order Entry</h3>
                <input type="text" id="oName" placeholder="Customer Name">
                <input type="text" id="oAddr" placeholder="Address">
                <input type="email" id="oEmail" placeholder="Email">
                <input type="tel" id="oPhone" placeholder="Phone">
                <label>Product (From Master Costs)</label>
                <select id="oProdDrop"></select>
                <input type="number" id="oQty" placeholder="Quantity" value="1">
                <textarea id="oDesc" placeholder="Description/Notes"></textarea>
                <button class="btn-primary" id="orderBtn" onclick="saveOrder()">Create Order</button>
            </div>
            <div id="order-list"></div>
        </div>

        <div id="pricing" class="page">
            <div class="card">
                <h3>Calculator</h3>
                <input type="text" id="calcProdName" placeholder="Product Name">
                <div id="active-materials"></div>
                <button class="btn-qty" style="width:100%; margin-bottom:15px;" onclick="addRow()">+ Add Material</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Labor (Mins)</label><input type="number" id="lMins" value="15" oninput="runCalc()"></div>
                    <div><label>Labor $/hr</label><input type="number" id="lRate" value="32" oninput="saveSettings()"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Markup (x)</label><input type="number" id="mUp" value="2" oninput="saveSettings()"></div>
                    <div><label>Tax (%)</label><input type="number" id="tRate" value="7" oninput="saveSettings()"></div>
                </div>
                <button class="btn-primary" id="calcBtn" onclick="saveMasterCost()">Save to Master Costs</button>
            </div>
        </div>

        <div id="materials" class="page">
            <div class="card">
                <h3 id="matHeader">Add Material</h3>
                <input type="text" id="matName" placeholder="Name">
                <input type="number" id="matCost" step="0.01" placeholder="Cost">
                <select id="matUnit">
                    <option value="qty">Per Item</option>
                    <option value="sqft">Sq Ft</option>
                    <option value="sqin">Sq In</option>
                    <option value="page">Page</option>
                </select>
                <button class="btn-primary" id="matBtn" onclick="saveMaterial()">Save Material</button>
            </div>
            <div id="mat-list-display"></div>
        </div>

        <div id="inventory" class="page">
            <div class="card">
                <h3 id="invHeader">Add Inventory</h3>
                <input type="text" id="invName" placeholder="Item Name">
                <input type="number" id="invQty" placeholder="Quantity">
                <button class="btn-primary" id="invBtn" onclick="saveInv()">Save Stock</button>
            </div>
            <div id="inv-list-display"></div>
        </div>

        <div id="costs" class="page">
            <div class="card"><h3>Master Cost List</h3></div>
            <div id="cost-list-display"></div>
        </div>
    </div>

    <div class="bottom-bar" id="price-bar" style="display:none;">
        CALCULATED TOTAL: <span id="final-price-out">$0.00</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1nxrTvgy8Z8queZ4eW2KsObizBmFSbEY",
            authDomain: "dim-accounting-app.firebaseapp.com",
            projectId: "dim-accounting-app",
            storageBucket: "dim-accounting-app.firebasestorage.app",
            messagingSenderId: "432651879673",
            appId: "1:432651879673:web:589f87967b39ac6a478e28"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let data = { orders:[], mats:[], inv:[], costs:[] };
        let edits = { order:null, mat:null, inv:null };

        // SYNC
        onSnapshot(doc(db, "settings", "biz"), (d) => { if(d.exists()){ const s=d.data(); document.getElementById('lRate').value=s.l; document.getElementById('mUp').value=s.m; document.getElementById('tRate').value=s.t; runCalc(); } });
        onSnapshot(collection(db, "orders"), (s) => { data.orders = s.docs.map(d=>({id:d.id,...d.data()})); renderOrders(); });
        onSnapshot(collection(db, "mats"), (s) => { data.mats = s.docs.map(d=>({id:d.id,...d.data()})); renderMats(); updatePricingDrops(); });
        onSnapshot(collection(db, "inv"), (s) => { data.inv = s.docs.map(d=>({id:d.id,...d.data()})); renderInv(); });
        onSnapshot(collection(db, "costs"), (s) => { data.costs = s.docs.map(d=>({id:d.id,...d.data()})); renderCosts(); updateOrderDrop(); });

        window.saveSettings = async () => { await setDoc(doc(db,"settings","biz"), { l:document.getElementById('lRate').value, m:document.getElementById('mUp').value, t:document.getElementById('tRate').value }); runCalc(); };

        // ORDERS
        window.saveOrder = async () => {
            const payload = { name:document.getElementById('oName').value, addr:document.getElementById('oAddr').value, email:document.getElementById('oEmail').value, phone:document.getElementById('oPhone').value, prod:document.getElementById('oProdDrop').value, qty:document.getElementById('oQty').value, desc:document.getElementById('oDesc').value };
            if(!payload.name) return;
            if(edits.order) { await updateDoc(doc(db,"orders",edits.order), payload); edits.order=null; document.getElementById('orderBtn').innerText="Create Order"; }
            else { await addDoc(collection(db,"orders"), payload); }
            ['oName','oAddr','oEmail','oPhone','oQty','oDesc'].forEach(i=>document.getElementById(i).value='');
        };
        window.editOrder = (id) => { const o = data.orders.find(x=>x.id===id); document.getElementById('oName').value=o.name; document.getElementById('oAddr').value=o.addr; document.getElementById('oEmail').value=o.email; document.getElementById('oPhone').value=o.phone; document.getElementById('oProdDrop').value=o.prod; document.getElementById('oQty').value=o.qty; document.getElementById('oDesc').value=o.desc; edits.order=id; document.getElementById('orderBtn').innerText="Update Order"; window.scrollTo(0,0); };

        // PRICING
        window.addRow = () => {
            const div = document.createElement('div'); div.className='material-row';
            div.innerHTML = `<select class="p-sel" onchange="runCalc()">${data.mats.map(m=>`<option value="${m.cost}">${m.name} ($${m.cost})</option>`).join('')}</select><input type="number" class="p-qty" value="1" oninput="runCalc()"><button class="btn-danger" onclick="this.parentElement.remove();runCalc();">✕</button>`;
            document.getElementById('active-materials').appendChild(div); runCalc();
        };
        window.runCalc = () => {
            let mSum = 0; document.querySelectorAll('.material-row').forEach(r=>{ mSum += (parseFloat(r.querySelector('.p-sel').value)||0) * (parseFloat(r.querySelector('.p-qty').value)||0); });
            const labor = (parseFloat(document.getElementById('lMins').value)/60) * parseFloat(document.getElementById('lRate').value);
            const total = (mSum + labor) * parseFloat(document.getElementById('mUp').value) * (1 + (parseFloat(document.getElementById('tRate').value)/100));
            document.getElementById('final-price-out').innerText = `$${total.toFixed(2)}`;
        };
        window.saveMasterCost = async () => { const n = document.getElementById('calcProdName').value; const p = document.getElementById('final-price-out').innerText; if(n) await addDoc(collection(db,"costs"), {name:n, price:p}); document.getElementById('calcProdName').value=''; };

        // MATERIALS
        window.saveMaterial = async () => {
            const p = { name:document.getElementById('matName').value, cost:document.getElementById('matCost').value, unit:document.getElementById('matUnit').value };
            if(edits.mat) { await updateDoc(doc(db,"mats",edits.mat), p); edits.mat=null; document.getElementById('matBtn').innerText="Save Material"; }
            else { await addDoc(collection(db,"mats"), p); }
            document.getElementById('matName').value=''; document.getElementById('matCost').value='';
        };
        window.editMat = (id) => { const m = data.mats.find(x=>x.id===id); document.getElementById('matName').value=m.name; document.getElementById('matCost').value=m.cost; document.getElementById('matUnit').value=m.unit; edits.mat=id; document.getElementById('matBtn').innerText="Update Material"; };

        // INVENTORY
        window.saveInv = async () => {
            const p = { name:document.getElementById('invName').value, qty:document.getElementById('invQty').value };
            if(edits.inv) { await updateDoc(doc(db,"inv",edits.inv), p); edits.inv=null; document.getElementById('invBtn').innerText="Save Stock"; }
            else { await addDoc(collection(db,"inv"), p); }
            document.getElementById('invName').value=''; document.getElementById('invQty').value='';
        };
        window.editInv = (id) => { const i = data.inv.find(x=>x.id===id); document.getElementById('invName').value=i.name; document.getElementById('invQty').value=i.qty; edits.inv=id; document.getElementById('invBtn').innerText="Update Stock"; };

        // RENDERING
        window.renderOrders = () => { document.getElementById('order-list').innerHTML = data.orders.map(o => `<div class="card list-item"><strong>${o.name}</strong><br><small>${o.prod} (Qty:${o.qty})</small><div class="action-btns"><button class="btn-qty" onclick="editOrder('${o.id}')">EDIT</button><button class="btn-danger" onclick="del('orders','${o.id}')">✕</button></div></div>`).join(''); };
        window.renderMats = () => { document.getElementById('mat-list-display').innerHTML = data.mats.map(m => `<div class="card list-item"><strong>${m.name}</strong> ($${m.cost}/${m.unit})<div class="action-btns"><button class="btn-qty" onclick="editMat('${m.id}')">EDIT</button><button class="btn-danger" onclick="del('mats','${m.id}')">✕</button></div></div>`).join(''); };
        window.renderInv = () => { document.getElementById('inv-list-display').innerHTML = data.inv.map(i => `<div class="card list-item"><strong>${i.name}</strong> (${i.qty})<div class="action-btns"><button class="btn-qty" onclick="editInv('${i.id}')">EDIT</button><button class="btn-danger" onclick="del('inv','${i.id}')">✕</button></div></div>`).join(''); };
        window.renderCosts = () => { document.getElementById('cost-list-display').innerHTML = data.costs.map(c => `<div class="card list-row"><strong>${c.name}</strong> <span>${c.price}</span> <button class="btn-danger" onclick="del('costs','${c.id}')">✕</button></div>`).join(''); };

        // SEARCH & UTILS
        window.filterLists = () => {
            const q = document.getElementById('globalSearch').value.toLowerCase();
            document.querySelectorAll('.card.list-item, .card.list-row').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(q) ? 'flex' : 'none';
                if(card.classList.contains('list-item')) card.style.display = card.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        };
        window.updateOrderDrop = () => { document.getElementById('oProdDrop').innerHTML = data.costs.map(c=>`<option value="${c.name}">${c.name} (${c.price})</option>`).join(''); };
        window.updatePricingDrops = () => { document.querySelectorAll('.p-sel').forEach(s => { const v=s.value; s.innerHTML = data.mats.map(m=>`<option value="${m.cost}">${m.name} ($${m.cost})</option>`).join(''); s.value=v; }); };
        window.del = async (c, id) => { if(confirm("Delete?")) await deleteDoc(doc(db, c, id)); };
        window.showPage = (id, el) => {
            document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            document.getElementById('price-bar').style.display = (id==='pricing') ? 'block' : 'none';
            document.getElementById('globalSearch').value = ''; filterLists();
        };

        addRow();
    </script>
</body>
</html>
