<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIM Bright Ideas LLC | Pro Manager</title>
    <style>
        :root { --primary: #2F6B64; --accent: #22c55e; --bg: #f1f5f9; --text: #1e293b; --danger: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        .header { background: white; padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .logo { font-weight: 900; color: var(--primary); font-size: 20px; text-transform: uppercase; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-item { flex: 0 0 auto; padding: 15px 20px; font-size: 11px; font-weight: bold; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 14px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 700; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-edit { background: #e2e8f0; color: var(--text); padding: 6px 10px; border-radius: 6px; border: none; font-size: 11px; cursor: pointer; margin-right: 5px; }
        .btn-danger { color: #ef4444; background: none; border: none; cursor: pointer; font-size: 14px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .material-row { display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 8px; align-items: end; margin-bottom: 12px; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>

    <div class="header"><div class="logo">DIM Bright Ideas LLC</div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('calc', this)">PRICING</div>
        <div class="nav-item" onclick="showPage('orders', this)">ORDERS</div>
        <div class="nav-item" onclick="showPage('catalog', this)">MATERIALS</div>
        <div class="nav-item" onclick="showPage('settings', this)">SETTINGS</div>
    </div>

    <div class="container">
        <div id="calc" class="page active">
            <div class="card">
                <h3>Product Calculator</h3>
                <label>Template Name</label><input type="text" id="prodName">
                <div id="material-list"></div>
                <button class="btn-edit" style="width:100%; margin-top:10px;" onclick="addMaterialRow()">+ Add Material</button>
            </div>
            <div class="card">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Labor (Mins)</label><input type="number" id="laborMinutes" value="15" oninput="calculate()"></div>
                    <div><label>Markup (x)</label><input type="number" id="markup" value="2" step="0.1" oninput="calculate()"></div>
                </div>
            </div>
        </div>

        <div id="orders" class="page">
            <div class="card">
                <h3 id="orderHeader">New Order</h3>
                <label>Customer Name</label><input type="text" id="custName">
                <label>Design Specs</label><textarea id="designSpecs" style="height:60px;"></textarea>
                <button class="btn-primary" id="saveOrderBtn" onclick="saveOrder()">Create Order</button>
            </div>
            <div id="order-display"></div>
        </div>

        <div id="catalog" class="page">
            <div class="card">
                <h3 id="catalogHeader">Add Material</h3>
                <label>Name</label><input type="text" id="newMatName">
                <label>Cost ($)</label><input type="number" id="newMatCost" step="0.01">
                <button class="btn-primary" id="catalogBtn" onclick="saveToCatalog()">Add to Catalog</button>
            </div>
            <div id="catalog-display"></div>
        </div>

        <div id="settings" class="page">
            <div class="card">
                <h3>Business Rules</h3>
                <label>Labor Rate ($/hr)</label><input type="number" id="setLabor" onchange="updateSettings()">
                <label>Sales Tax (%)</label><input type="number" id="setTax" onchange="updateSettings()">
            </div>
        </div>
    </div>

    <div class="bottom-bar" id="calc-footer"><div style="display:flex; justify-content:space-between;"><span>Total Price:</span> <span id="out-total">$0.00</span></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1nxrTvgy8Z8queZ4eW2KsObizBmFSbEY",
            authDomain: "dim-accounting-app.firebaseapp.com",
            projectId: "dim-accounting-app",
            storageBucket: "dim-accounting-app.firebasestorage.app",
            messagingSenderId: "432651879673",
            appId: "1:432651879673:web:589f87967b39ac6a478e28"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let catalog = [], orders = [], bizSettings = { labor: 32, tax: 7 };
        let editingCatalogId = null, editingOrderId = null;

        // SYNC DATA
        onSnapshot(doc(db, "settings", "business"), (d) => { if(d.exists()) { bizSettings = d.data(); document.getElementById('setLabor').value = bizSettings.labor; document.getElementById('setTax').value = bizSettings.tax; calculate(); } });
        onSnapshot(collection(db, "catalog"), (s) => { catalog = s.docs.map(d => ({id: d.id, ...d.data()})); renderCatalog(); });
        onSnapshot(collection(db, "orders"), (s) => { orders = s.docs.map(d => ({id: d.id, ...d.data()})); renderOrders(); });

        window.updateSettings = async () => { await setDoc(doc(db, "settings", "business"), { labor: parseFloat(document.getElementById('setLabor').value), tax: parseFloat(document.getElementById('setTax').value) }); };

        // CATALOG EDIT/SAVE
        window.saveToCatalog = async () => {
            const data = { name: document.getElementById('newMatName').value, cost: parseFloat(document.getElementById('newMatCost').value) };
            if(!data.name) return;
            if(editingCatalogId) { await updateDoc(doc(db, "catalog", editingCatalogId), data); editingCatalogId = null; document.getElementById('catalogBtn').innerText = "Add to Catalog"; document.getElementById('catalogHeader').innerText = "Add Material"; }
            else { await addDoc(collection(db, "catalog"), data); }
            document.getElementById('newMatName').value = ''; document.getElementById('newMatCost').value = '';
        };

        window.editCatalog = (id) => {
            const item = catalog.find(x => x.id === id);
            editingCatalogId = id;
            document.getElementById('newMatName').value = item.name;
            document.getElementById('newMatCost').value = item.cost;
            document.getElementById('catalogBtn').innerText = "Update Material";
            document.getElementById('catalogHeader').innerText = "Editing Material";
            window.scrollTo(0,0);
        };

        // ORDER EDIT/SAVE
        window.saveOrder = async () => {
            const data = { customer: document.getElementById('custName').value, notes: document.getElementById('designSpecs').value, timestamp: Date.now() };
            if(editingOrderId) { await updateDoc(doc(db, "orders", editingOrderId), data); editingOrderId = null; document.getElementById('saveOrderBtn').innerText = "Create Order"; document.getElementById('orderHeader').innerText = "New Order"; }
            else { await addDoc(collection(db, "orders"), data); }
            document.getElementById('custName').value = ''; document.getElementById('designSpecs').value = '';
        };

        window.editOrder = (id) => {
            const order = orders.find(x => x.id === id);
            editingOrderId = id;
            document.getElementById('custName').value = order.customer;
            document.getElementById('designSpecs').value = order.notes;
            document.getElementById('saveOrderBtn').innerText = "Update Order";
            document.getElementById('orderHeader').innerText = "Editing Order";
            window.scrollTo(0,0);
        };

        // CALCULATION LOGIC
        window.addMaterialRow = (selectedVal = null, qty = 1) => {
            const div = document.createElement('div'); div.className = 'material-row';
            div.innerHTML = `<div><label>Mat</label><select class="mat-select" onchange="calculate()">${catalog.map(m => `<option value="${m.cost}" ${selectedVal == m.cost ? 'selected' : ''}>${m.name}</option>`).join('')}</select></div><div><label>Qty</label><input type="number" class="mat-qty" value="${qty}" oninput="calculate()"></div><button class="btn-danger" onclick="this.parentElement.remove(); calculate();">✕</button>`;
            document.getElementById('material-list').appendChild(div); calculate();
        };

        window.calculate = () => {
            let mTotal = 0; document.querySelectorAll('.material-row').forEach(r => { mTotal += (parseFloat(r.querySelector('.mat-select').value) || 0) * (parseFloat(r.querySelector('.mat-qty').value) || 0); });
            const mins = parseFloat(document.getElementById('laborMinutes').value) || 0;
            const markup = parseFloat(document.getElementById('markup').value) || 1;
            const sub = (mTotal + (mins / 60 * bizSettings.labor)) * markup;
            document.getElementById('out-total').innerText = `$${(sub * (1 + bizSettings.tax/100)).toFixed(2)}`;
        };

        window.renderCatalog = () => { document.getElementById('catalog-display').innerHTML = catalog.map(m => `<div class="card list-row"><div><strong>${m.name}</strong><br><small>$${m.cost}</small></div><div><button class="btn-edit" onclick="editCatalog('${m.id}')">Edit</button><button class="btn-danger" onclick="deleteItem('catalog', '${m.id}')">✕</button></div></div>`).join(''); };
        window.renderOrders = () => { document.getElementById('order-display').innerHTML = orders.map(o => `<div class="card"><div style="display:flex; justify-content:space-between;"><strong>${o.customer}</strong><div><button class="btn-edit" onclick="editOrder('${o.id}')">Edit</button><button class="btn-danger" onclick="deleteItem('orders', '${o.id}')">✕</button></div></div><p style="font-size:12px; margin-top:5px;">${o.notes}</p></div>`).join(''); };
        window.deleteItem = async (col, id) => { if(confirm("Delete permanently?")) await deleteDoc(doc(db, col, id)); };
        window.showPage = (id, el) => { document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active')); document.getElementById(id).classList.add('active'); el.classList.add('active'); document.getElementById('calc-footer').style.display = (id==='calc'?'block':'none'); };

        addMaterialRow();
    </script>
</body>
</html>
