<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIM Bright Ideas LLC | Pro</title>
    <style>
        :root { --primary: #2F6B64; --accent: #22c55e; --bg: #f1f5f9; --text: #1e293b; --danger: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .logo { font-weight: 900; color: var(--primary); font-size: 18px; text-transform: uppercase; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-item { flex: 0 0 auto; padding: 15px 15px; font-size: 10px; font-weight: bold; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 12px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        label { display: block; font-size: 9px; font-weight: 800; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-qty { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f5f9; }
        .material-row { display: grid; grid-template-columns: 1.2fr 0.8fr 0.5fr auto; gap: 5px; align-items: end; margin-bottom: 10px; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; border-radius: 15px 15px 0 0; z-index: 1000; }
        .small-text { font-size: 11px; color: #64748b; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="header"><div class="logo">DIM Bright Ideas LLC</div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('orders', this)">Orders</div>
        <div class="nav-item" onclick="showPage('pricing', this)">Pricing</div>
        <div class="nav-item" onclick="showPage('materials', this)">Materials</div>
        <div class="nav-item" onclick="showPage('inventory', this)">Inventory</div>
        <div class="nav-item" onclick="showPage('costs', this)">Costs</div>
    </div>

    <div class="container">
        <div id="orders" class="page active">
            <div class="card">
                <h3>New Order Entry</h3>
                <input type="text" id="oName" placeholder="Customer Name">
                <input type="text" id="oAddr" placeholder="Shipping Address">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="email" id="oEmail" placeholder="Email">
                    <input type="tel" id="oPhone" placeholder="Phone">
                </div>
                <input type="text" id="oProd" placeholder="Product (e.g. 20oz Tumbler)">
                <input type="number" id="oQty" placeholder="Quantity" value="1">
                <textarea id="oDesc" placeholder="Description/Design Notes" style="height:80px;"></textarea>
                <button class="btn-primary" onclick="saveOrder()">Create Order</button>
            </div>
            <div id="order-list"></div>
        </div>

        <div id="pricing" class="page">
            <div class="card">
                <h3>Pricing Calculator</h3>
                <label>Product Name</label><input type="text" id="calcProdName" placeholder="e.g. Custom Hoodie">
                
                <div id="calc-materials-container">
                    <label>Materials from Catalog</label>
                    <div id="active-materials"></div>
                    <button class="btn-qty" style="width:100%; margin-bottom:15px;" onclick="addRow()">+ Add Material</button>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Labor (Mins)</label><input type="number" id="lMins" value="15" oninput="runCalc()"></div>
                    <div><label>Labor $/hr</label><input type="number" id="lRate" value="32" oninput="runCalc()"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Markup (x)</label><input type="number" id="mUp" value="2" step="0.1" oninput="runCalc()"></div>
                    <div><label>Tax (%)</label><input type="number" id="tRate" value="7" oninput="runCalc()"></div>
                </div>
                <button class="btn-primary" onclick="saveToMasterCosts()">Save to Master Costs</button>
            </div>
        </div>

        <div id="materials" class="page">
            <div class="card">
                <h3>Define Raw Materials</h3>
                <input type="text" id="matName" placeholder="Material Name (e.g. Vinyl)">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="number" id="matCost" step="0.01" placeholder="Cost per Unit">
                    <select id="matUnit">
                        <option value="qty">Quantity (ea)</option>
                        <option value="sqft">Sq. Feet</option>
                        <option value="sqin">Sq. Inches</option>
                        <option value="page">Pages</option>
                    </select>
                </div>
                <button class="btn-primary" onclick="saveMaterial()">Add Material</button>
            </div>
            <div id="mat-list-display"></div>
        </div>

        <div id="inventory" class="page">
            <div class="card">
                <h3>Finished Goods/Blanks</h3>
                <input type="text" id="invName" placeholder="Item Name">
                <input type="number" id="invQty" placeholder="Quantity on Hand">
                <button class="btn-primary" onclick="saveInv()">Update Shelf</button>
            </div>
            <div id="inv-list-display"></div>
        </div>

        <div id="costs" class="page">
            <div class="card">
                <h3>Master Product Pricing</h3>
                <p class="small-text">Calculated totals saved from your Pricing tab appear here.</p>
            </div>
            <div id="master-costs-display"></div>
        </div>
    </div>

    <div class="bottom-bar" id="price-bar" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-weight:bold;">
            <span>ESTIMATED TOTAL:</span>
            <span id="final-price-out">$0.00</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB1nxrTvgy8Z8queZ4eW2KsObizBmFSbEY",
            authDomain: "dim-accounting-app.firebaseapp.com",
            projectId: "dim-accounting-app",
            storageBucket: "dim-accounting-app.firebasestorage.app",
            messagingSenderId: "432651879673",
            appId: "1:432651879673:web:589f87967b39ac6a478e28"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let materials = [], inventory = [], orders = [], masterCosts = [];

        // LIVE SYNC
        onSnapshot(collection(db, "materials"), (s) => { materials = s.docs.map(d => ({id:d.id, ...d.data()})); renderMats(); refreshPricingDrops(); });
        onSnapshot(collection(db, "inventory"), (s) => { inventory = s.docs.map(d => ({id:d.id, ...d.data()})); renderInv(); });
        onSnapshot(collection(db, "orders"), (s) => { orders = s.docs.map(d => ({id:d.id, ...d.data()})); renderOrders(); });
        onSnapshot(collection(db, "masterCosts"), (s) => { masterCosts = s.docs.map(d => ({id:d.id, ...d.data()})); renderMasterCosts(); });

        // TAB 1: ORDERS
        window.saveOrder = async () => {
            const data = { name: document.getElementById('oName').value, addr: document.getElementById('oAddr').value, email: document.getElementById('oEmail').value, phone: document.getElementById('oPhone').value, prod: document.getElementById('oProd').value, qty: document.getElementById('oQty').value, desc: document.getElementById('oDesc').value, ts: Date.now() };
            if(data.name) await addDoc(collection(db, "orders"), data);
            ['oName','oAddr','oEmail','oPhone','oProd','oQty','oDesc'].forEach(id => document.getElementById(id).value='');
        };

        window.renderOrders = () => {
            document.getElementById('order-list').innerHTML = orders.sort((a,b)=>b.ts-a.ts).map(o => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between;"><strong>${o.name}</strong> <button class="btn-danger" onclick="del('orders','${o.id}')">✕</button></div>
                    <div class="small-text">${o.prod} (Qty: ${o.qty})<br>${o.addr}<br>${o.phone} | ${o.email}</div>
                    <p style="font-size:12px; background:#f8fafc; padding:8px; border-radius:4px; margin-top:8px;">${o.desc}</p>
                </div>`).join('');
        };

        // TAB 2: PRICING
        window.addRow = () => {
            const div = document.createElement('div'); div.className = 'material-row';
            div.innerHTML = `
                <select class="p-mat-sel" onchange="runCalc()">${materials.map(m => `<option value="${m.cost}">${m.name} ($${m.cost})</option>`).join('')}</select>
                <input type="number" class="p-mat-qty" value="1" oninput="runCalc()">
                <span class="small-text">qty</span>
                <button class="btn-danger" onclick="this.parentElement.remove(); runCalc();">✕</button>`;
            document.getElementById('active-materials').appendChild(div); runCalc();
        };

        window.runCalc = () => {
            let mSum = 0; document.querySelectorAll('.material-row').forEach(r => { mSum += (parseFloat(r.querySelector('.p-mat-sel').value)||0) * (parseFloat(r.querySelector('.p-mat-qty').value)||0); });
            const labor = (parseFloat(document.getElementById('lMins').value)/60) * parseFloat(document.getElementById('lRate').value);
            const subtotal = (mSum + labor) * parseFloat(document.getElementById('mUp').value);
            const total = subtotal * (1 + (parseFloat(document.getElementById('tRate').value)/100));
            document.getElementById('final-price-out').innerText = `$${total.toFixed(2)}`;
            return total.toFixed(2);
        };

        window.saveToMasterCosts = async () => {
            const name = document.getElementById('calcProdName').value;
            const price = document.getElementById('final-price-out').innerText;
            if(name) await addDoc(collection(db, "masterCosts"), { name, price });
            document.getElementById('calcProdName').value = '';
        };

        // TAB 3: MATERIALS
        window.saveMaterial = async () => {
            const name = document.getElementById('matName').value;
            const cost = parseFloat(document.getElementById('matCost').value);
            const unit = document.getElementById('matUnit').value;
            if(name && cost) await addDoc(collection(db, "materials"), { name, cost, unit });
            document.getElementById('matName').value=''; document.getElementById('matCost').value='';
        };
        window.renderMats = () => { document.getElementById('mat-list-display').innerHTML = materials.map(m => `<div class="card list-row"><span><strong>${m.name}</strong> ($${m.cost}/${m.unit})</span> <button class="btn-danger" onclick="del('materials','${m.id}')">✕</button></div>`).join(''); };

        // TAB 4: INVENTORY
        window.saveInv = async () => {
            const name = document.getElementById('invName').value;
            const qty = parseInt(document.getElementById('invQty').value);
            if(name) await addDoc(collection(db, "inventory"), { name, qty });
            document.getElementById('invName').value=''; document.getElementById('invQty').value='';
        };
        window.renderInv = () => { document.getElementById('inv-list-display').innerHTML = inventory.map(i => `<div class="card list-row"><span><strong>${i.name}</strong> (${i.qty})</span> <button class="btn-danger" onclick="del('inventory','${i.id}')">✕</button></div>`).join(''); };

        // TAB 5: COSTS
        window.renderMasterCosts = () => { document.getElementById('master-costs-display').innerHTML = masterCosts.map(c => `<div class="card list-row"><span><strong>${c.name}</strong></span> <span style="font-weight:bold; color:var(--primary);">${c.price}</span> <button class="btn-danger" onclick="del('masterCosts','${c.id}')">✕</button></div>`).join(''); };

        // HELPERS
        window.del = async (c, id) => { if(confirm("Delete?")) await deleteDoc(doc(db, c, id)); };
        window.showPage = (id, el) => {
            document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            document.getElementById('price-bar').style.display = (id==='pricing') ? 'block' : 'none';
        };
        window.refreshPricingDrops = () => { document.querySelectorAll('.p-mat-sel').forEach(s => { const val = s.value; s.innerHTML = materials.map(m => `<option value="${m.cost}">${m.name} ($${m.cost})</option>`).join(''); s.value = val; }); };

        addRow();
    </script>
</body>
</html>
