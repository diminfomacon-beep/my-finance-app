<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PriceEngine Pro</title>
    <style>
        :root { --primary: #2F6B64; --accent: #22c55e; --bg: #f1f5f9; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 140px; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 16px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; display: flex; justify-content: space-between; }
        label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; background: #fff; }
        
        .material-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 8px; align-items: end; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .btn-add { background: #f8fafc; color: var(--primary); border: 2px dashed var(--primary); padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-remove { background: #fee2e2; color: #ef4444; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
        
        /* Saved Items List */
        .saved-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .saved-item:last-child { border-bottom: none; }
        .btn-edit { background: #dcfce7; color: #166534; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-left: 5px;}

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; border-radius: 20px 20px 0 0; z-index: 100; }
        .total-line { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Product Details</h3>
        <label>Product Name</label>
        <input type="text" id="prodName" placeholder="e.g. Custom Blue T-Shirt">
        
        <div id="material-list"></div>
        <button class="btn-add" onclick="addMaterialRow()">+ Add Material</button>
    </div>

    <div class="card">
        <h3>Labor & Markup</h3>
        <label>Comp Time (Mins)</label>
        <input type="number" id="laborMinutes" value="15" oninput="calculate()">
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>Markup (x)</label>
                <input type="number" id="markup" value="2" step="0.1" oninput="calculate()">
            </div>
            <div>
                <label>Tax (%)</label>
                <input type="number" id="taxRate" value="7" oninput="calculate()">
            </div>
        </div>
        <button class="btn-save" onclick="saveProduct()">Save Product</button>
    </div>

    <div class="card">
        <h3>Saved Products</h3>
        <div id="saved-list"></div>
    </div>

    <div class="bottom-bar">
        <div class="total-line"><span>Total:</span> <span id="out-total">$0.00</span></div>
    </div>

    <script>
       <script>
    // Updated price list to match your new dropdown options
    const PRICES = { 
        "SubPaper": 1.00, 
        "HTVPaper": 1.00, 
        "IronOn": 3.00, 
        "PermVinyl": 2.00,
        "PolyesterFabric": 2.00,
        "ButtonBase": 3.00,
        "PolyesterShirt": 15.99,
        "AdultCottonShirt": 15.99,
        "KidsCottonShirt": 10.99
    };

    const HOURLY_LABOR = 30;
    const HOURLY_OVERHEAD = 2;
    
    let savedProducts = JSON.parse(localStorage.getItem('myProducts')) || [];
    let editingId = null;

    // Pro-Tip: I've added a "Safety Check" to the calculate function below 
    // so it never shows NaN again, even if you add a material you forgot to price.

    function calculate() {
        let matTotal = 0;
        document.querySelectorAll('.material-row').forEach(row => {
            const type = row.querySelector('.mat-type').value;
            const qty = parseFloat(row.querySelector('.mat-qty').value) || 0;
            
            // The (PRICES[type] || 0) ensures that if a price is missing, 
            // it uses 0 instead of breaking the math.
            const unitPrice = PRICES[type] || 0;
            matTotal += (unitPrice * qty);
        });

        const mins = parseFloat(document.getElementById('laborMinutes').value) || 0;
        const laborPlusOverhead = (mins / 60) * (HOURLY_LABOR + HOURLY_OVERHEAD);
        const subtotal = matTotal + laborPlusOverhead;
        
        const markup = parseFloat(document.getElementById('markup').value) || 1;
        const tax = parseFloat(document.getElementById('taxRate').value) || 0;
        
        const final = (subtotal * markup) * (1 + (tax / 100));
        
        const output = isNaN(final) ? "0.00" : final.toFixed(2);
        document.getElementById('out-total').innerText = `$${output}`;
        return output;
    }
    
        function addMaterialRow(type = "SubPaper", qty = 1) {
            const container = document.getElementById('material-list');
            const div = document.createElement('div');
            div.className = 'material-row';
            div.innerHTML = `
                <div>
                    <label>Type</label>
                    <select class="mat-type" onchange="calculate()">
                        <option value="SubPaper" ${type==='SubPaper'?'selected':''}>Sub. Paper ($1)</option>
                        <option value="HTVPaper" ${type==='HTVPaper'?'selected':''}>HTV Paper ($1)</option>
                        <option value="IronOn" ${type==='IronOn'?'selected':''}>Iron-On ($3)</option>
                        <option value="PermVinyl" ${type==='PermVinyl'?'selected':''}>Perm Vinyl ($2)</option>
                        <option value="PolyesterFabric" ${type==='PolyesterFabric'?'selected':''}>Fabric ($2)</option>
                        <option value="ButtonBase" ${type==='ButtonBase'?'selected':''}>Button-3" ($3)</option>
                        <option value="PolyesterShirt" ${type==='PolyesterShirt'?'selected':''}>Adult Poly Shirt ($15.99)</option>
                        <option value="AdultCottonShirt" ${type==='AdultCottonShirt'?'selected':''}>Adult Cotton Shirt ($15.99)</option>
                        <option value="KidsCottonShirt" ${type==='KidsCottonShirt'?'selected':''}>Kids Cotton Shirt ($10.99)</option>

                    </select>
                </div>
                <div>
                    <label>Qty/SqFt</label>
                    <input type="number" class="mat-qty" value="${qty}" oninput="calculate()">
                </div>
                <button class="btn-remove" onclick="this.parentElement.remove(); calculate();">✕</button>
            `;
            container.appendChild(div);
            calculate();
        }

        function saveProduct() {
            const name = document.getElementById('prodName').value || "Unnamed Product";
            const materials = Array.from(document.querySelectorAll('.material-row')).map(row => ({
                type: row.querySelector('.mat-type').value,
                qty: row.querySelector('.mat-qty').value
            }));

            const productData = {
                id: editingId || Date.now(),
                name: name,
                materials: materials,
                labor: document.getElementById('laborMinutes').value,
                markup: document.getElementById('markup').value,
                tax: document.getElementById('taxRate').value,
                total: calculate()
            };

            if (editingId) {
                const index = savedProducts.findIndex(p => p.id === editingId);
                savedProducts[index] = productData;
            } else {
                savedProducts.unshift(productData);
            }

            localStorage.setItem('myProducts', JSON.stringify(savedProducts));
            resetForm();
            renderSaved();
        }

        function editProduct(id) {
            const p = savedProducts.find(prod => prod.id === id);
            editingId = id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('laborMinutes').value = p.labor;
            document.getElementById('markup').value = p.markup;
            document.getElementById('taxRate').value = p.tax;
            
            document.getElementById('material-list').innerHTML = '';
            p.materials.forEach(m => addMaterialRow(m.type, m.qty));
            window.scrollTo(0,0);
        }

        function resetForm() {
            editingId = null;
            document.getElementById('prodName').value = '';
            document.getElementById('material-list').innerHTML = '';
            addMaterialRow();
        }

        function renderSaved() {
            const list = document.getElementById('saved-list');
            list.innerHTML = savedProducts.map(p => `
                <div class="saved-item">
                    <div><strong>${p.name}</strong><br><small>$${p.total}</small></div>
                    <div>
                        <button class="btn-edit" onclick="editProduct(${p.id})">Edit</button>
                        <button class="btn-edit" style="background:#fee2e2; color:#ef4444;" onclick="deleteProduct(${p.id})">Del</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteProduct(id) {
            savedProducts = savedProducts.filter(p => p.id !== id);
            localStorage.setItem('myProducts', JSON.stringify(savedProducts));
            renderSaved();
        }

        addMaterialRow();
        renderSaved();
    </script>
</body>
</html>
