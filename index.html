<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PriceEngine Pro</title>
    <style>
        :root { --primary: #2F6B64; --accent: #22c55e; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 16px; color: var(--primary); border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; margin-bottom: 12px; box-sizing: border-box; }
        
        .material-row { display: grid; grid-template-columns: 2fr 1fr auto; gap: 8px; align-items: end; margin-bottom: 10px; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        .btn-add { background: #e2e8f0; color: #475569; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-remove { background: #fee2e2; color: #ef4444; border: none; padding: 12px; border-radius: 8px; cursor: pointer; }
        
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 20px; border-radius: 20px 20px 0 0; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .summary-line { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 4px; opacity: 0.9; }
        .total-line { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>1. Materials Used</h3>
        <div id="material-list">
            </div>
        <button class="btn-add" onclick="addMaterialRow()">+ Add Material</button>
    </div>

    <div class="card">
        <h3>2. Labor & Time</h3>
        <label>Composition Time (Minutes)</label>
        <input type="number" id="laborMinutes" value="15" oninput="calculate()">
        
        <label>Markup Multiplier (e.g. 2 for 100%)</label>
        <input type="number" id="markup" value="2" step="0.1" oninput="calculate()">

        <label>Tax Rate (%)</label>
        <input type="number" id="taxRate" value="7" oninput="calculate()">
    </div>

    <div class="bottom-bar">
        <div class="summary-line"><span>Material Cost:</span> <span id="out-mat">$0.00</span></div>
        <div class="summary-line"><span>Labor + Overhead:</span> <span id="out-labor">$0.00</span></div>
        <div class="total-line"><span>Total Price:</span> <span id="out-total">$0.00</span></div>
    </div>

    <script>
        const PRICES = {
            "SubPaper": 1.00,
            "HTVPaper": 1.00,
            "IronOn": 3.00,
            "PermVinyl": 2.00
        };
        const HOURLY_LABOR = 30;
        const HOURLY_OVERHEAD = 2;

        function addMaterialRow() {
            const container = document.getElementById('material-list');
            const div = document.createElement('div');
            div.className = 'material-row';
            div.innerHTML = `
                <div>
                    <label>Type</label>
                    <select class="mat-type" onchange="calculate()">
                        <option value="SubPaper">Sub. Paper/Ink ($1)</option>
                        <option value="HTVPaper">HTV Paper/Ink ($1)</option>
                        <option value="IronOn">Iron-On Vinyl ($3/sqft)</option>
                        <option value="PermVinyl">Perm Vinyl ($2/sqft)</option>
                    </select>
                </div>
                <div>
                    <label>Qty/SqFt</label>
                    <input type="number" class="mat-qty" value="1" oninput="calculate()">
                </div>
                <button class="btn-remove" onclick="this.parentElement.remove(); calculate();">✕</button>
            `;
            container.appendChild(div);
            calculate();
        }

        function calculate() {
            // Calculate Materials
            let materialTotal = 0;
            document.querySelectorAll('.material-row').forEach(row => {
                const type = row.querySelector('.mat-type').value;
                const qty = parseFloat(row.querySelector('.mat-qty').value) || 0;
                materialTotal += (PRICES[type] * qty);
            });

            // Calculate Labor & Overhead
            const mins = parseFloat(document.getElementById('laborMinutes').value) || 0;
            const laborCost = (mins / 60) * HOURLY_LABOR;
            const overheadCost = (mins / 60) * HOURLY_OVERHEAD;
            
            const subtotal = materialTotal + laborCost + overheadCost;
            
            // Apply Markup and Tax
            const markup = parseFloat(document.getElementById('markup').value) || 1;
            const taxPercent = parseFloat(document.getElementById('taxRate').value) || 0;
            
            const markedUpPrice = subtotal * markup;
            const finalTotal = markedUpPrice * (1 + (taxPercent / 100));

            // UI Update
            document.getElementById('out-mat').innerText = `$${materialTotal.toFixed(2)}`;
            document.getElementById('out-labor').innerText = `$${(laborCost + overheadCost).toFixed(2)}`;
            document.getElementById('out-total').innerText = `$${finalTotal.toFixed(2)}`;
        }

        // Initialize with one row
        addMaterialRow();
    </script>
</body>
</html>
