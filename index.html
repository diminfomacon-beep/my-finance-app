<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIM Bright Ideas LLC | Pro Suite</title>
    <style>
        :root { --primary: #2F6B64; --accent: #22c55e; --bg: #f1f5f9; --text: #1e293b; --danger: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 120px; }
        .header { background: white; padding: 15px; text-align: center; border-bottom: 2px solid var(--primary); }
        .logo { font-weight: 900; color: var(--primary); font-size: 18px; text-transform: uppercase; }
        .nav-bar { display: flex; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .nav-item { flex: 0 0 auto; padding: 15px 15px; font-size: 10px; font-weight: bold; color: #64748b; cursor: pointer; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .nav-item.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { padding: 15px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .collapsible-content { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .collapsible-content.open { display: block; }
        h3 { margin: 0; font-size: 12px; color: var(--primary); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        h4 { margin: 0; font-size: 9px; color: var(--primary); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        label { display: block; font-size: 9px; font-weight: 800; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 15px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .search-input { border: 2px solid var(--primary); background: #fff; margin-bottom: 15px; position: sticky; top: 55px; z-index: 999; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-action {background: #f1f5f9; border: 1px solid #e2e8f0; padding: 8px 12px; border-radius: 6px; font-size: 18px; color: #2F6B64;cursor: pointer; margin-right: 10px;}
        .btn-danger { color: var(--danger); border: none; background: none; font-weight: bold; cursor: pointer; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .material-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 10px; align-items: end; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); color: white; padding: 15px; border-radius: 15px 15px 0 0; font-weight: bold; text-align: center; z-index: 1001; }
        .toggle-icon { font-size: 18px; transition: transform 0.3s; }
        .open .toggle-icon { transform: rotate(45deg); }
        .btn-danger {color: #ef4444;border: none;  background: none;  font-weight: bold; font-size: 18px; cursor: pointer; padding: 5px 10px;}
    </style>
</head>
<body>
    <div id="auth-header" style="background:#fff; padding:10px; text-align:right; border-bottom:1px solid #ddd;">
        <span id="user-email" style="font-size:12px; margin-right:10px;"></span>
        <button id="login-btn" onclick="handleAuth()" style="padding:5px 10px; cursor:pointer;">Login</button>
    </div>

    <div class="header"><div class="logo">DIM Bright Ideas LLC</div></div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('orders', this)">Orders</div>
        <div class="nav-item" onclick="showPage('inventory', this)">Inventory</div>
        <div class="nav-item" onclick="showPage('materials', this)">Materials</div>
        <div class="nav-item" onclick="showPage('pricing', this)">Calculator</div>
        <div class="nav-item" onclick="showPage('costs', this)">Products</div>
        <div class="nav-item" onclick="showPage('specs', this)">Specs</div>
    </div>

    <div class="container">
        <input type="text" id="tabSearch" class="search-input" placeholder="Search this tab..." oninput="applySearch()">

        <div id="orders" class="page active">
            <div class="card" onclick="toggleForm('order-form')">
                <h3 id="orderHeader"><span>+ Add New Order</span> <span class="toggle-icon">+</span></h3>
                <div id="order-form" class="collapsible-content" onclick="event.stopPropagation()">
                    <input type="text" id="oName" placeholder="Customer Name">
                    <input type="text" id="oAddr" placeholder="Address">
                    <input type="email" id="oEmail" placeholder="Email">
                    <input type="tel" id="oPhone" placeholder="Phone">
                    <label>Order Items</label>
                    <div id="order-items-container" style="margin-bottom: 10px;">
                        </div>
                    <button type="button" class="btn-primary" style="background:#e2e8f0; color:#2F6B64; margin-bottom:15px; padding: 10px;" onclick="addOrderItemRow()">+ Add Item to Order</button>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                        <div>
                            <label>Discount %</label>
                            <input type="number" id="oDiscount" value="0" oninput="calculateOrderTotal()">
                        </div>
                        <div>
                            <label>Order Total</label>
                            <input type="text" id="oTotal" readonly placeholder="$0.00" style="background: #f8fafc; font-weight: bold;">
                        </div>
                    </div>
                    <textarea id="oDesc" placeholder="Order Description"></textarea>
                    <label>Order Status</label>
                    <select id="oStatus">
                        <option value="New">New</option>
                        <option value="Processing">Processing</option>
                        <option value="Ready for Pick up">Ready for Pick up</option>
                        <option value="Ready to Ship">Ready to Ship</option>
                        <option value="Shipped">Shipped</option>
                        <option value="Picked up">Picked up</option>
                        <option value="Delivered">Delivered</option>
                    </select>
                    <button class="btn-primary" id="orderBtn" onclick="saveOrder()">Save Order</button>
                </div>
            </div>
            <div id="order-list"></div>
        </div>

       <div id="pricing" class="page">
        <div class="card">
            <h3>Price Calculator</h3>
            <input type="text" id="calcProdName" placeholder="Product Name">
            <h4>Required Materials</h4>
            <div id="active-materials"></div>
            
            <button class="btn-primary" style="margin-bottom:15px; background: #e2e8f0; color: #2F6B64;" onclick="addCalcRow()">+</button>            
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Labor (Mins)</label><input type="number" id="lMins" value="15" oninput="runCalc()"></div>
                    <div><label>Labor $/hr</label><input type="number" id="lRate" value="32" oninput="saveBizSettings()"></div>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Markup (x)</label><input type="number" id="mUp" value="2" oninput="saveBizSettings()"></div>
                    <div><label>Tax (%)</label><input type="number" id="tRate" value="7" oninput="saveBizSettings()"></div>
                </div>
                <button class="btn-primary" onclick="saveToMasterCosts()">Save to Products</button>
            </div>
        </div>

        <div id="materials" class="page">
            <div class="card" onclick="toggleForm('mat-form')">
                <h3 id="matHeader"><span>+ Add Raw Material</span> <span class="toggle-icon">+</span></h3>
                <div id="mat-form" class="collapsible-content" onclick="event.stopPropagation()">
                    <input type="text" id="matName" placeholder="Material Name">
                    <input type="number" id="matCost" step="0.01" placeholder="Cost per unit">
                    <select id="matUnit">
                        <option value="ea">Quantity (ea)</option>
                        <option value="sqft">Sq Ft</option>
                        <option value="sqin">Sq In</option>
                        <option value="page">Page</option>
                    </select>
                    <button class="btn-primary" id="matBtn" onclick="saveMaterial()">Save Material</button>
                </div>
            </div>
            <div id="mat-list"></div>
        </div>

        <div id="inventory" class="page">
            <div class="card" onclick="toggleForm('inv-form')">
                <h3 id="invHeader"><span>+ Add Inventory Item</span> <span class="toggle-icon">+</span></h3>
                <div id="inv-form" class="collapsible-content" onclick="event.stopPropagation()">
                    <input type="number" id="invCost" step="0.01" placeholder="Cost per item (for calculator)">
                    <input type="text" id="invName" placeholder="Item Name">
                    <input type="number" id="invQty" placeholder="Qty">
                    <button class="btn-primary" id="invBtn" onclick="saveInventory()">Save Stock</button>
                </div>
            </div>
            <div id="inv-list"></div>
        </div>

        <div id="costs" class="page">
            <div class="card"><h3>Product Price List</h3></div>
            <div id="cost-list"></div>
        </div>
    </div>

    <div class="bottom-bar" id="calc-footer" style="display:none;">
        CALCULATED TOTAL: <span id="grand-total">$0.00</span>
    </div>
    <div id="specs" class="page">
        <div class="card" onclick="toggleForm('spec-form')">
            <h3 id="specHeader"><span>+ Add Product Specs</span> <span class="toggle-icon">+</span></h3>
            <div id="spec-form" class="collapsible-content" onclick="event.stopPropagation()">
                <input type="text" id="sName" placeholder="Product Name (e.g. 20oz Skinny)">
                
                <label>Print Size Option</label>
                <select id="sSize">
                    <option value="Full Wrap / Small Print">Full Wrap & Small Print Options</option>
                    <option value="Full Wrap Only">Full Wrap Only</option>
                    <option value="Small Print Only">Small Print Only</option>
                    <option value="Standard/Single">Standard / Single Option</option>
                </select>

                <label>Print Style</label>
                <select id="sStyle">
                    <option value="Sublimation">Sublimation</option>
                    <option value="Vinyl">Vinyl (HTV)</option>
                    <option value="Screen Print Transfer">Screen Print Transfer</option>
                </select>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div><label>Temp (°F)</label><input type="number" id="sTemp" placeholder="385"></div>
                    <div><label>Time (Secs)</label><input type="number" id="sTime" placeholder="60"></div>
                </div>
                <div>
                    <textarea id="sNotes" placeholder="Special Notes (e.g. Mirror image, cool peel)"></textarea>
                    <button class="btn-primary" id="specBtn" onclick="saveSpec()">Save Specs</button>
                </div>
            </div>
        </div>
        <div id="spec-list"></div>
    </div>

    <script type="module">
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
         const firebaseConfig = {
            apiKey: "AIzaSyB1nxrTvgy8Z8queZ4eW2KsObizBmFSbEY",
            authDomain: "dim-accounting-app.firebaseapp.com",
            projectId: "dim-accounting-app",
            storageBucket: "dim-accounting-app.firebasestorage.app",
            messagingSenderId: "432651879673",
            appId: "1:432651879673:web:589f87967b39ac6a478e28"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();   
            // IMPORTANT: This 'window.' prefix makes the function visible to your HTML button
 

        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('login-btn');
            const emailDisp = document.getElementById('user-email');
            
            if (user) {
                console.log("User is logged in:", user.email);
                btn.innerText = "Logout";
                emailDisp.innerText = user.email;
                // Re-render the current tab now that we have permission
                const activeTab = document.querySelector('.nav-item.active').innerText.toLowerCase();
                render(activeTab); 
            } else {
                console.log("User is logged out.");
                btn.innerText = "Login";
                emailDisp.innerText = "Logged Out";
                // Optional: Clear the lists so unauthorized people can't see them
                document.getElementById('order-list').innerHTML = "Please login to view data.";
            }
        });

        window.handleAuth = async () => {
            console.log("Login button clicked!"); 
            try {
                if (auth.currentUser) {
                    console.log("Logging out...");
                    await signOut(auth);
                } else {
                    console.log("Opening Google Popup...");
                    await signInWithPopup(auth, provider);
                }
            } catch (error) {
                console.error("Auth Error:", error.code, error.message);
                // This will alert you if the domain isn't authorized!
                alert("Error: " + error.code); 
            }
        };

        let store = { orders:[], catalog:[], inventory:[], masterCosts:[], specs:[] };
        let activeEdits = { order:null, mat:null, inv:null, spec:null };

        // FIREBASE SYNC
        onSnapshot(doc(db, "settings", "business"), (d) => { if(d.exists()){ const s=d.data(); document.getElementById('lRate').value=s.labor||32; document.getElementById('mUp').value=s.markup||2; document.getElementById('tRate').value=s.tax||7; runCalc(); }});
        onSnapshot(collection(db, "orders"), (s) => { store.orders = s.docs.map(d=>({id:d.id,...d.data()})); render('orders'); });
       // --- FIX: Corrected Listeners ---
        onSnapshot(collection(db, "materials"), (s) => { 
            store.materials = s.docs.map(d=>({id:d.id,...d.data()})); 
            render('materials'); 
            updateCalcDrops(); 
        });

        onSnapshot(collection(db, "inventory"), (s) => { 
            store.inventory = s.docs.map(d => ({id: d.id, ...d.data()})); 
            render('inventory'); 
            updateCalcDrops(); 
        });

        onSnapshot(collection(db, "masterCosts"), (s) => { 
            store.masterCosts = s.docs.map(d=>({id:d.id,...d.data()})); 
            render('masterCosts'); 
            // This is the line you were missing to make Products show in Orders:
            updateOrderDrops(); 
        });
        onSnapshot(collection(db, "specs"), (s) => { store.specs = s.docs.map(d=>({id:d.id,...d.data()})); render('specs'); });

        window.toggleForm = (id) => { document.getElementById(id).classList.toggle('open'); document.getElementById(id).parentElement.classList.toggle('open'); };

        window.saveBizSettings = async () => { await setDoc(doc(db,"settings","business"), { labor:document.getElementById('lRate').value, markup:document.getElementById('mUp').value, tax:document.getElementById('tRate').value }); runCalc(); };

        window.saveOrder = async () => {
    const items = [];
    document.querySelectorAll('#order-items-container .material-row').forEach(row => {
        items.push({
            name: row.querySelector('.item-sel').value,
            qty: row.querySelector('.item-qty').value
        });
    });

    const p = {
        name: document.getElementById('oName').value,
        items: items, // Saved as an array
        total: document.getElementById('oTotal').value,
        discount: document.getElementById('oDiscount').value,
        status: document.getElementById('oStatus').value,
        addr: document.getElementById('oAddr').value, 
        email: document.getElementById('oEmail').value, 
        phone: document.getElementById('oPhone').value, 
        prod: document.getElementById('oProdDrop').value, 
        qty: document.getElementById('oQty').value, 
        desc: document.getElementById('oDesc').value, 
        status: statusVal 
    };

            if(!p.name) return;
            
            if(activeEdits.order) { 
                await updateDoc(doc(db, "orders", activeEdits.order), p); 
                activeEdits.order = null; 
                document.getElementById('orderBtn').innerText = "Save Order"; 
            } else { 
                await addDoc(collection(db, "orders"), p); 
            }

            // Clear the form
            ['oName','oAddr','oEmail','oPhone','oQty','oDesc'].forEach(i => document.getElementById(i).value = '');
            if(document.getElementById('oStatus')) document.getElementById('oStatus').value = "New";
            
            toggleForm('order-form');
        };
        window.saveMaterial = async () => {
            const p = { name:document.getElementById('matName').value, cost:document.getElementById('matCost').value, unit:document.getElementById('matUnit').value };
            if(!p.name) return;
            
            // Change "catalog" to "materials" in both lines below
            if(activeEdits.mat) { 
                await updateDoc(doc(db,"materials",activeEdits.mat), p); 
                activeEdits.mat=null; 
                document.getElementById('matBtn').innerText="Save Material"; 
            }
            else { 
                await addDoc(collection(db,"materials"), p); 
            }
            
            document.getElementById('matName').value=''; 
            document.getElementById('matCost').value='';
            toggleForm('mat-form');
        };

       window.saveInventory = async () => {
            const p = { 
                name: document.getElementById('invName').value, 
                qty: document.getElementById('invQty').value,
                cost: document.getElementById('invCost').value // Add this
            };
            if(!p.name) return;
            if(activeEdits.inv) { await updateDoc(doc(db,"inventory",activeEdits.inv), p); activeEdits.inv=null; document.getElementById('invBtn').innerText="Save Stock"; }
            else { await addDoc(collection(db,"inventory"), p); }
            document.getElementById('invName').value=''; document.getElementById('invQty').value='';
            toggleForm('inv-form');
        };
        window.saveSpec = async () => {
            const p = { 
                name: document.getElementById('sName').value, 
                size: document.getElementById('sSize').value, 
                style: document.getElementById('sStyle').value, 
                temp: document.getElementById('sTemp').value, 
                time: document.getElementById('sTime').value, 
                notes: document.getElementById('sNotes').value 
            };
            if(!p.name) return;
            if(activeEdits.spec) { 
                await updateDoc(doc(db,"specs",activeEdits.spec), p); 
                activeEdits.spec=null; 
                document.getElementById('specBtn').innerText="Save Specs"; 
            } else { 
                await addDoc(collection(db,"specs"), p); 
            }
            ['sName','sTemp','sTime','sNotes'].forEach(i=>document.getElementById(i).value='');
            toggleForm('spec-form');
        };

       window.addOrderItemRow = (data = {name: '', qty: 1}) => {
            const container = document.getElementById('order-items-container');
            const d = document.createElement('div');
            d.className = 'material-row';
            
            // Safety check: if masterCosts hasn't loaded yet, use an empty array
            const products = store.masterCosts || [];
            
            const productOptions = products.map(c => {
                // Clean the price string (remove $ and commas) so math works
                const cleanPrice = c.price ? c.price.toString().replace(/[$,]/g, '') : "0";
                const isSelected = (c.name === data.name) ? 'selected' : '';
                return `<option value="${c.name}" data-price="${cleanPrice}" ${isSelected}>${c.name} (${c.price})</option>`;
            }).join('');

            d.innerHTML = `
                <select class="item-sel" onchange="calculateOrderTotal()">
                    <option value="" disabled ${!data.name ? 'selected' : ''}>Select Product...</option>
                    ${productOptions}
                </select>
                <input type="number" class="item-qty" value="${data.qty}" min="1" oninput="calculateOrderTotal()">
                <button type="button" class="btn-danger" onclick="this.parentElement.remove();calculateOrderTotal();">✕</button>
            `;
            container.appendChild(d);
            calculateOrderTotal();
        };

        window.calculateOrderTotal = () => {
            let subtotal = 0;
            document.querySelectorAll('#order-items-container .material-row').forEach(row => {
                const sel = row.querySelector('.item-sel');
                const price = parseFloat(sel.options[sel.selectedIndex]?.dataset.price) || 0;
                const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                subtotal += (price * qty);
            });
            const disc = parseFloat(document.getElementById('oDiscount').value) || 0;
            const total = subtotal * (1 - (disc / 100));
            document.getElementById('oTotal').value = `$${total.toFixed(2)}`;
        };

        window.editObj = (type, id) => {
            if(type==='order'){ 
                const o=store.orders.find(x=>x.id===id); 
                document.getElementById('oName').value=o.name; document.getElementById('oAddr').value=o.addr; document.getElementById('oEmail').value=o.email; document.getElementById('oPhone').value=o.phone; document.getElementById('oProdDrop').value=o.prod; document.getElementById('oQty').value=o.qty; document.getElementById('oDesc').value=o.desc; document.getElementById('oStatus').value = o.status || "New";
                activeEdits.order=id; document.getElementById('orderBtn').innerText="Update Order"; if(!document.getElementById('order-form').classList.contains('open')) toggleForm('order-form');
            }
            if(type==='mat'){ 
                // Change store.catalog to store.materials
                const m = store.materials.find(x => x.id === id); 
                if(m) {
                    document.getElementById('matName').value = m.name; 
                    document.getElementById('matCost').value = m.cost; 
                    document.getElementById('matUnit').value = m.unit; 
                    activeEdits.mat = id; 
                    document.getElementById('matBtn').innerText = "Update Material"; 
                    if(!document.getElementById('mat-form').classList.contains('open')) toggleForm('mat-form');
                }
            }
            if(type==='inv'){ 
                const i=store.inventory.find(x=>x.id===id); 
                document.getElementById('invName').value=i.name; document.getElementById('invQty').value=i.qty; 
                activeEdits.inv=id; document.getElementById('invBtn').innerText="Update Stock"; if(!document.getElementById('inv-form').classList.contains('open')) toggleForm('inv-form');
            }
            // Update your existing editObj function to include 'spec'
            if(type==='spec'){
                const s = store.specs.find(x=>x.id===id);
                document.getElementById('sName').value = s.name;
                document.getElementById('sSize').value = s.size;
                document.getElementById('sStyle').value = s.style;
                document.getElementById('sTemp').value = s.temp;
                document.getElementById('sTime').value = s.time;
                activeEdits.spec = id;
                document.getElementById('specBtn').innerText = "Update Specs";
                if(!document.getElementById('spec-form').classList.contains('open')) toggleForm('spec-form');
            }
            window.scrollTo(0,0);
        };

       window.addCalcRow = () => {
            const d = document.createElement('div'); 
            d.className = 'material-row';
        
            // Combine both lists so you can select from either
            const allItems = [...(store.materials || []), ...(store.inventory || [])];
            
            // Create the dropdown options using NAME as the value
            const options = allItems.map(item => 
                `<option value="${item.name}">${item.name} ($${item.cost || 0})</option>`
            ).join('');
        
            d.innerHTML = `
                <select class="calc-sel" onchange="runCalc()">
                    <option value="" disabled selected>Select Item...</option>
                    ${options}
                </select>
                <input type="number" class="calc-qty" value="1" placeholder="Qty" oninput="runCalc()">
                <button class="btn-danger" onclick="this.parentElement.remove();runCalc();">✕</button>
            `;
        
            document.getElementById('active-materials').appendChild(d); 
            runCalc();
        };
window.runCalc = () => {
    let mTotal = 0;
    // Target only the rows inside the Calculator (active-materials)
    document.querySelectorAll('#active-materials .material-row').forEach(row => { 
        const sel = row.querySelector('.calc-sel');
        // FIX: Get price from the 'data-cost' of the SELECTED option only
        const selectedOption = sel.options[sel.selectedIndex];
        const price = selectedOption ? parseFloat(selectedOption.dataset.cost || 0) : 0;
        const qty = parseFloat(row.querySelector('.calc-qty').value) || 0;
        
        mTotal += (price * qty); 
    });

    // ... rest of your labor/markup math ...
    const laborRate = parseFloat(document.getElementById('lRate').value) || 0;
    const laborMins = parseFloat(document.getElementById('lMins').value) || 0;
    const laborCost = (laborMins / 60) * laborRate;
    const markup = parseFloat(document.getElementById('mUp').value) || 1;
    const taxRate = parseFloat(document.getElementById('tRate').value) || 0;

    const grandTotal = (mTotal + laborCost) * markup * (1 + (taxRate / 100));
    document.getElementById('grand-total').innerText = `$${grandTotal.toFixed(2)}`;
};
        window.saveToMasterCosts = async () => { const n = document.getElementById('calcProdName').value; const p = document.getElementById('grand-total').innerText; if(n) await addDoc(collection(db,"masterCosts"), {name:n, price:p}); document.getElementById('calcProdName').value=''; };

       window.render = (tab) => {
            // 1. Setup container and data
            const targets = { 
                'orders': 'order-list', 
                'materials': 'mat-list', // Change 'catalog' to 'materials'
                'inventory': 'inv-list', 
                'specs': 'spec-list', 
                'masterCosts': 'cost-list' 
            };

            const labels = { 
                'materials': 'mat', // Change 'catalog' to 'materials'
                'inventory': 'inv', 
                'specs': 'spec', 
                'orders': 'order' 
            };            
            const container = document.getElementById(targets[tab]);
                if (!container) return;

            const items = store[tab] || [];
// Change 'order' to 'orders' (or whatever your editObj function uses)
            const editLabel = labels[tab];

            // 2. Special Case: Orders (Grouped by Status)
            if (tab === 'orders') {
                    const statuses = ["New", "Processing", "Ready for Pick up", "Ready to Ship", "Shipped", "Picked up", "Delivered"];                container.innerHTML = statuses.map(status => {
                    const filtered = items.filter(i => (i.status || "New") === status);
                    if (filtered.length === 0) return ''; 

                    return `
                        <div class="status-group" style="margin-top: 20px;">
                            <div style="background:var(--primary); color:white; padding:5px 10px; border-radius:5px; font-size:10px; display:inline-block; margin-bottom:10px;">${status.toUpperCase()}</div>
                            ${filtered.map(i => renderCard(i, tab, editLabel)).join('')}
                        </div>`;
                }).join('');
            } else {
                // 3. Default Case: Regular List
                container.innerHTML = items.map(i => renderCard(i, tab, editLabel)).join('');
            }

            applySearch();
        };

        // Helper function to keep the main logic clean
        function renderCard(i, tab, editLabel) {
            // Determine the right-side detail text
            let detail = i.price || i.qty || '$' + (i.cost || 0);
            if (tab === 'specs') {
                detail = `${i.style}<br>${i.temp || 0}°F - ${i.time || 0}s`;
            } else if (tab === 'orders') {
                detail = `${i.prod} (x${i.qty})`;
            }

            return `
            <div class="card list-item-card">
                <div class="list-row">
                    <strong>${i.name}</strong> 
                    <span style="font-size: 11px; text-align: right;">${detail}</span>
                </div>
                
                ${(tab === 'specs' && i.notes) ? `<p style="font-size:10px; color:#64748b; margin-top:5px; font-style:italic;">Note: ${i.notes}</p>` : ''}
                ${(tab === 'orders' && i.desc) ? `<div style="font-size:11px; color:#64748b; margin-bottom:8px;">${i.desc}</div>` : ''}

                <div style="margin-top:10px;">
                    ${tab !== 'masterCosts' ? `<button class="btn-action" onclick="editObj('${editLabel}','${i.id}')">&#9998;</button>` : ''}
                    <button class="btn-danger" onclick="remove('${tab}','${i.id}')">&#10006;</button>
                </div>
            </div>`;
        }
        window.applySearch = () => {
            const q = document.getElementById('tabSearch').value.toLowerCase();
            document.querySelectorAll('.list-item-card').forEach(c => { c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none'; });
        };

        window.remove = async (c, id) => { if(confirm("Delete permanently?")) await deleteDoc(doc(db, c, id)); };
window.updateOrderDrops = () => {
    document.querySelectorAll('.item-sel').forEach(sel => {
        const currentVal = sel.value; // Remember what was selected
        const options = store.masterCosts.map(c => {
            const cleanPrice = c.price ? c.price.toString().replace(/[$,]/g, '') : "0";
            return `<option value="${c.name}" data-price="${cleanPrice}" ${c.name === currentVal ? 'selected' : ''}>${c.name} (${c.price})</option>`;
        }).join('');
        
        sel.innerHTML = `<option value="" disabled ${!currentVal ? 'selected' : ''}>Select Product...</option>` + options;
    });
};
window.updateCalcDrops = () => { 
    document.querySelectorAll('.calc-sel').forEach(s => { 
        const savedName = s.dataset.selectedName || s.value; // Store the NAME, not the price
        
        const allOptions = [
            ...(store.materials || []).map(m => ({ name: m.name, cost: m.cost })),
            ...(store.inventory || []).map(i => ({ name: i.name, cost: i.cost || 0 }))
        ];

        s.innerHTML = `<option value="" disabled>Select Item...</option>` + 
            allOptions.map(opt => {
                // Use the NAME as the value to keep items unique
                return `<option value="${opt.name}" data-cost="${opt.cost}" ${opt.name === savedName ? 'selected' : ''}>
                    ${opt.name} ($${opt.cost})
                </option>`;
            }).join('');
        
        // Save the selection to a data attribute so it survives the next refresh
        s.onchange = (e) => {
            s.dataset.selectedName = e.target.value;
            runCalc();
        };
    }); 
};
        window.showPage = (id, el) => {
            document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            document.getElementById('calc-footer').style.display = (id==='pricing') ? 'block' : 'none';
            document.getElementById('tabSearch').value = ''; applySearch();
        };

        addCalcRow();
        addOrderItemRow();
